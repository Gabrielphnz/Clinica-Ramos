<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
  <style>
    body { background-color: #F4F7FE; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }
    .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .header-cot { background: #4318FF; color: white; border-radius: 20px 20px 0 0; padding: 30px; text-align: center; }
    .btn-save { background: #05CD99; color: white; border-radius: 12px; font-weight: 800; padding: 15px; border: none; width: 100%; }
  </style>
</head>
<body>
  <div class="container" style="max-width: 600px;">
    <div class="card">
      <div class="header-cot">
        <h3 class="fw-bold mb-1">Cotação de Materiais</h3>
        <p class="mb-0 opacity-75">Odontologia Ramos</p>
      </div>
      <div class="card-body p-4">
        <div class="mb-4">
          <label class="form-label fw-bold text-muted small">NOME DA SUA EMPRESA (FORNECEDOR)</label>
          <input type="text" id="fornecedor" class="form-control form-control-lg shadow-sm" placeholder="Ex: Dental Speed" required>
        </div>
        
        <h6 class="fw-bold mb-3">Lista de Materiais Solicitados:</h6>
        <div id="listaItens">Carregando itens...</div>
        
        <button class="btn-save mt-4 shadow" onclick="enviarPrecos()" id="btnEnv">ENVIAR COTAÇÃO</button>
      </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const idCotacao = urlParams.get('id');

    window.onload = () => {
      google.script.run.withSuccessHandler(exibirItens).getItensParaCotar();
    };

    function exibirItens(itens) {
      let html = '';
      itens.forEach((item, index) => {
        html += `
          <div class="item-row bg-light p-3 rounded-4 mb-3 shadow-sm border">
            <div class="fw-bold text-dark mb-2">${item.nome}</div>
            <div class="row g-2">
              <div class="col-6">
                <label class="small text-muted">Preço Unit. (R$)</label>
                <input type="number" class="form-control preco-input" data-nome="${item.nome}" placeholder="0.00" step="0.01">
              </div>
              <div class="col-6">
                <label class="small text-muted">Marca</label>
                <input type="text" class="form-control marca-input" placeholder="Opcional">
              </div>
            </div>
          </div>`;
      });
      document.getElementById('listaItens').innerHTML = html;
    }

    function enviarPrecos() {
      const forn = document.getElementById('fornecedor').value;
      if(!forn) return alert("Por favor, identifique sua empresa!");
      
      document.getElementById('btnEnv').disabled = true;
      document.getElementById('btnEnv').innerText = "Enviando...";

      const rows = document.querySelectorAll('.item-row');
      let dados = { fornecedor: forn, idCotacao: idCotacao, itens: [] };

      rows.forEach(r => {
        dados.itens.push({
          nome: r.querySelector('.preco-input').getAttribute('data-nome'),
          preco: r.querySelector('.preco-input').value,
          marca: r.querySelector('.marca-input').value
        });
      });

      google.script.run.withSuccessHandler(res => {
        document.body.innerHTML = `<div class='text-center p-5'><h2 class='fw-bold'>${res}</h2><p>Pode fechar esta janela.</p></div>`;
      }).salvarRespostaFornecedor(dados);
    }
  </script>
</body>
</html>
