<div class="modal fade" id="modalAgendamento" tabindex="-1" style="z-index: 1060; background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(4px);" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered modal-lg"> <div class="modal-content border-0 shadow-lg" style="border-radius: 28px; overflow: hidden; background: #ffffff;">
      
      <div class="modal-body p-4 p-sm-5 position-relative">
        <button type="button" class="btn-close position-absolute shadow-none" data-bs-dismiss="modal" style="top: 24px; right: 24px; z-index: 10; opacity: 0.5;"></button>
        
        <div class="d-flex align-items-center gap-3 mb-4">
          <div class="text-primary bg-primary bg-opacity-10 rounded-3 d-inline-flex align-items-center justify-content-center shadow-sm" style="width: 48px; height: 48px;">
            <span class="material-icons" style="font-size: 24px;">calendar_month</span>
          </div>
          <div>
            <h5 class="fw-bold mb-0 text-dark">Reserva de Horário</h5>
            <small class="text-muted fw-bold">Preencha os dados do agendamento</small>
          </div>
        </div>

        <form id="formAgendamento">
          <input type="hidden" id="agenda_id" value="">
          
          <div class="row g-3">
            
            <div class="col-12 position-relative">
              <label class="form-label fw-bold mb-1" style="color: #2B3674; font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase;">PACIENTE</label>
              <div class="input-group shadow-sm" style="border-radius: 14px; overflow: visible;">
                <input type="text" class="form-control border-0 bg-light py-2 fw-bold text-primary shadow-none" id="ag_paciente" required autocomplete="off" onkeyup="autocompletePacienteAgenda(this.value)" placeholder="Buscar no CRM..." style="border-top-left-radius: 14px; border-bottom-left-radius: 14px;">
                
                <button class="btn btn-light border-0 bg-light text-primary px-3 shadow-none" type="button" onclick="abrirProntuarioDaAgenda()" title="Abrir Prontuário" style="border-left: 2px solid #ffffff;">
                  <span class="material-icons" style="font-size: 18px; vertical-align: middle;">assignment_ind</span>
                </button>
                
                <button class="btn border-0 px-3 shadow-none" type="button" onclick="abrirNovoPacienteDoLancamento()" title="Cadastrar Novo" style="border-top-right-radius: 14px; border-bottom-right-radius: 14px; background: #6366f1; color: white;">
                  <span class="material-icons" style="font-size: 18px; vertical-align: middle;">person_add</span>
                </button>
              </div>
              <div id="ag-autocomplete-list" class="autocomplete-suggestions shadow-lg border-0" style="display: none; position: absolute; z-index: 1000; width: 100%; top: calc(100% + 5px); border-radius: 12px; overflow: hidden;"></div>
            </div>

            <div class="col-md-4">
              <label class="form-label fw-bold mb-1" style="color: #2B3674; font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase;">DATA</label>
              <input type="text" id="ag_data" class="form-control border-0 bg-light py-2 fw-bold text-secondary shadow-none text-center" style="border-radius: 14px;" required>
            </div>

            <div class="col-md-4">
              <label class="form-label fw-bold mb-1" style="color: #2B3674; font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase;">HORA</label>
              <input type="time" id="ag_hora" class="form-control border-0 bg-light py-2 fw-bold text-secondary shadow-none text-center" style="border-radius: 14px;" required>
            </div>

            <div class="col-md-4">
              <label class="form-label fw-bold mb-1" style="color: #2B3674; font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase;">STATUS</label>
              <select id="ag_status" class="form-select border-0 bg-light py-2 fw-bold text-primary shadow-sm" style="border-radius: 14px;">
                <option value="AGENDADO">🕒 AGENDADO</option>
                <option value="CONFIRMADO">✅ CONFIRMADO</option>
                <option value="EM ATENDIMENTO">🦷 EM ATENDIMENTO</option>
                <option value="FINALIZADO">💰 FINALIZADO / PAGAR</option>
                <option value="FALTOU">❌ FALTOU</option>
                <option value="CANCELADO">🚫 CANCELADO</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold mb-1" style="color: #2B3674; font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase;">DOUTOR</label>
              <select id="ag_doutor" class="form-select border-0 bg-light py-2 fw-bold text-secondary shadow-none" style="border-radius: 14px;" required>
                <option value="">Selecione...</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold mb-1" style="color: #2B3674; font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase;">PROCEDIMENTO</label>
              <select id="ag_procedimento" class="form-select border-0 bg-light py-2 fw-bold text-secondary shadow-none" style="border-radius: 14px;" required>
                <option value="">Selecione...</option>
              </select>
            </div>

            <div class="col-12">
              <label class="form-label fw-bold mb-1" style="color: #2B3674; font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase;">OBSERVAÇÕES (OPCIONAL)</label>
              <input type="text" id="ag_obs" class="form-control border-0 bg-light py-2 fw-bold text-secondary shadow-none" style="border-radius: 14px;" placeholder="Ex: Paciente com dor, Retorno...">
            </div>
            
          </div>
        </form>
      </div>
      
      <div class="modal-footer border-0 px-4 px-sm-5 pb-4 pt-0 bg-white d-flex justify-content-between align-items-center position-relative">
        
        <div>
           <button type="button" class="btn btn-link text-danger text-decoration-none fw-bold p-0" id="btnExcluirAg" style="display:none; font-size: 13px;" onclick="excluirAgendamento()">
              <span class="material-icons align-middle" style="font-size: 16px;">delete</span> EXCLUIR
           </button>
        </div>
        
        <div class="d-flex gap-2">
          <button type="button" class="btn fw-bold py-2 px-4 shadow-none border-0" data-bs-dismiss="modal" style="background: #e2e8f0; color: #475569; border-radius: 12px; font-size: 14px;">CANCELAR</button>
          <button type="button" class="btn btn-dark fw-bold py-2 px-5 shadow-sm border-0" onclick="salvarAgendamento()" style="border-radius: 12px; background: #1e293b; font-size: 14px; z-index: 99999; pointer-events: auto;">RESERVAR HORÁRIO</button>
        </div>
      </div>

    </div>
  </div>
</div>
